<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI VOC 인사이트 분석기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fc; color: #1a1a2e; min-height: 100vh; }

    .header { background: #fff; border-bottom: 1px solid #e8eaf0; padding: 16px 24px; display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 32px; height: 32px; background: #185FA5; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    .header h1 { font-size: 16px; font-weight: 600; color: #1a1a2e; }
    .header span { font-size: 13px; color: #888; margin-left: 4px; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    .upload-card { background: #fff; border-radius: 16px; border: 1px solid #e8eaf0; padding: 40px; text-align: center; margin-bottom: 20px; }
    .upload-zone { border: 2px dashed #c8d0e0; border-radius: 12px; padding: 40px 24px; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; }
    .upload-zone:hover, .upload-zone.dragover { border-color: #185FA5; background: #f0f6ff; }
    .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-zone h2 { font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .upload-zone p { font-size: 13px; color: #888; }
    .file-badge { display: inline-flex; align-items: center; gap: 6px; background: #eaf3de; color: #3B6D11; font-size: 13px; padding: 6px 12px; border-radius: 20px; margin-bottom: 16px; }

    .sample-btn { background: #f4f6fa; border: 1px solid #e0e4ed; color: #555; font-size: 13px; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .sample-btn:hover { background: #e8edf5; }

    .analyze-btn { width: 100%; padding: 14px; background: #185FA5; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 16px; }
    .analyze-btn:hover:not(:disabled) { background: #0C447C; }
    .analyze-btn:disabled { background: #c8d0e0; color: #fff; cursor: not-allowed; }

    .loading-card { background: #fff; border-radius: 16px; border: 1px solid #e8eaf0; padding: 48px; text-align: center; display: none; }
    .loading-spinner { width: 48px; height: 48px; border: 3px solid #e8eaf0; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .loading-card p { font-size: 13px; color: #888; margin-bottom: 20px; }
    .progress-track { height: 6px; background: #f0f2f7; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #185FA5; border-radius: 3px; width: 0%; transition: width 0.4s ease; }

    .result-section { display: none; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .result-header h2 { font-size: 18px; font-weight: 600; }
    .reset-btn { background: #fff; border: 1px solid #e0e4ed; color: #555; font-size: 13px; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
    .reset-btn:hover { background: #f4f6fa; }

    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .metric-card { background: #fff; border-radius: 12px; border: 1px solid #e8eaf0; padding: 20px; text-align: center; }
    .metric-num { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .metric-num.red { color: #A32D2D; }
    .metric-num.green { color: #3B6D11; }
    .metric-label { font-size: 12px; color: #888; margin-top: 4px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .insight-card { background: #fff; border-radius: 12px; border: 1px solid #e8eaf0; padding: 20px; }
    .insight-card h3 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

    .bar-item { margin-bottom: 14px; }
    .bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .bar-rank { font-size: 12px; color: #aaa; min-width: 16px; }
    .bar-topic { font-size: 14px; color: #1a1a2e; flex: 1; margin: 0 8px; }
    .bar-pct { font-size: 13px; font-weight: 600; color: #555; }
    .bar-track { height: 6px; background: #f0f2f7; border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
    .bar-example { font-size: 11px; color: #aaa; }

    .issue-item { background: #fff8f8; border: 1px solid #f5c4c4; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .issue-item h4 { font-size: 14px; font-weight: 600; color: #A32D2D; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .issue-item p { font-size: 13px; color: #791F1F; }
    .suggest-item { background: #f0f6ff; border: 1px solid #b5d4f4; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .suggest-item h4 { font-size: 14px; font-weight: 600; color: #185FA5; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .suggest-item p { font-size: 13px; color: #0C447C; }

    .summary-card { background: #fff; border-radius: 12px; border: 1px solid #e8eaf0; padding: 20px; }
    .summary-card h3 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .summary-card p { font-size: 14px; color: #444; line-height: 1.7; }

    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .badge-red { background: #fcebeb; color: #A32D2D; }
    .badge-blue { background: #e6f1fb; color: #185FA5; }

    @media (max-width: 600px) {
      .two-col { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">📊</div>
  <h1>AI VOC 인사이트 분석기</h1>
  <span>by Claude API</span>
</div>

<div class="container">

  <div class="upload-card" id="upload-section">
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📂</div>
      <h2>VOC CSV 파일을 드래그하거나 클릭해서 업로드</h2>
      <p>고객 리뷰 · 고객센터 문의 · 앱스토어 리뷰 · VOC 데이터</p>
    </div>
    <input type="file" id="file-input" accept=".csv" style="display:none">

    <div id="file-badge" style="display:none" class="file-badge">
      ✓ <span id="file-name-text"></span>
    </div>

    <div style="margin-bottom: 16px;">
      <button class="sample-btn" onclick="loadSample()">📋 샘플 데이터로 체험하기</button>
    </div>

    <button class="analyze-btn" id="analyze-btn" disabled onclick="runAnalysis()">
      ✨ AI 분석 시작
    </button>
  </div>

  <div class="loading-card" id="loading-section">
    <div class="loading-spinner"></div>
    <h2 id="loading-msg">Claude가 VOC를 분석하고 있어요...</h2>
    <p id="loading-sub">주요 불만 · 긍정 의견 · 긴급 이슈를 추출하는 중</p>
    <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-header">
      <h2>📊 분석 결과</h2>
      <button class="reset-btn" onclick="resetAll()">↺ 다시 분석</button>
    </div>

    <div class="metric-grid" id="metrics"></div>

    <div class="two-col">
      <div class="insight-card">
        <h3>😤 고객 불만 TOP 5</h3>
        <div id="complaints"></div>
      </div>
      <div class="insight-card">
        <h3>😊 긍정 의견 TOP 5</h3>
        <div id="positives"></div>
      </div>
    </div>

    <div class="two-col">
      <div class="insight-card">
        <h3>🚨 긴급 이슈</h3>
        <div id="urgent"></div>
      </div>
      <div class="insight-card">
        <h3>💡 기능 개선 제안</h3>
        <div id="suggestions"></div>
      </div>
    </div>

    <div class="summary-card">
      <h3>📋 종합 요약</h3>
      <p id="summary"></p>
    </div>
  </div>

</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const analyzeBtn = document.getElementById('analyze-btn');
  let csvContent = '';

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      csvContent = e.target.result;
      document.getElementById('file-name-text').textContent = `${file.name} (${(file.size/1024).toFixed(1)}KB)`;
      document.getElementById('file-badge').style.display = 'inline-flex';
      analyzeBtn.disabled = false;
    };
    reader.readAsText(file, 'UTF-8');
  }

  function loadSample() {
    csvContent = `id,date,channel,content
1,2025-06-01,앱리뷰,배송이 너무 늦어요. 주문한지 5일이 지났는데 아직도 안왔어요
2,2025-06-01,고객문의,원하는 제품이 항상 품절이에요. 재고 관리 좀 해주세요
3,2025-06-01,앱리뷰,앱이 자꾸 튕겨요. 결제 중에도 튕기니까 너무 불편해요
4,2025-06-02,VOC,배송 지연이 너무 잦아요. 빠른 배송이 장점이었는데 요즘은 아니네요
5,2025-06-02,앱리뷰,상품 다양성이 좋아요. 없는 게 없을 정도로 종류가 많아서 만족해요
6,2025-06-02,고객문의,교환 환불 과정이 너무 복잡해요. 좀 더 간단하게 해주세요
7,2025-06-03,앱리뷰,직원들이 친절하고 제품 추천도 잘 해줘요. 매장 경험이 좋아요
8,2025-06-03,VOC,앱 로딩이 너무 느려요. 특히 검색할 때 3-4초씩 걸려요
9,2025-06-03,앱리뷰,멤버십 혜택이 좋아요. 포인트 적립도 빠르고 쿠폰도 많이 줘서 좋아요
10,2025-06-04,고객문의,결제 오류가 계속 발생해요. 카드 결제가 안돼서 취소했어요
11,2025-06-04,앱리뷰,가격이 합리적이에요. 다른 곳보다 저렴하게 살 수 있어서 자주 이용해요
12,2025-06-04,VOC,배송 출발했다고 알림 왔는데 이틀 더 걸렸어요. 배송 추적이 부정확해요
13,2025-06-05,앱리뷰,신제품 소식을 앱에서 바로 확인할 수 있어서 좋아요
14,2025-06-05,고객문의,재고 없는 상품도 알림 신청 기능 만들어주세요. 자꾸 품절이라 불편해요
15,2025-06-05,앱리뷰,앱이 너무 느려요. 업데이트 후로 더 느려진 것 같아요
16,2025-06-06,VOC,배송 지연 문제 빨리 해결해주세요. 선물 약속했는데 늦게 와서 민망했어요
17,2025-06-06,앱리뷰,리뷰 시스템이 유용해요. 다른 사람들 후기 보고 구매 결정하기 좋아요
18,2025-06-06,고객문의,앱 다크모드 지원해주세요. 밤에 쓰기 너무 눈부셔요
19,2025-06-07,앱리뷰,품절 상품 재입고 알림 기능이 있으면 좋겠어요
20,2025-06-07,VOC,결제 시스템 불안정해요. 오늘만 두 번 오류났어요. 긴급하게 확인 필요해요`;
    document.getElementById('file-name-text').textContent = 'oliveyoung_voc_sample.csv (샘플)';
    document.getElementById('file-badge').style.display = 'inline-flex';
    analyzeBtn.disabled = false;
  }

  async function runAnalysis() {
    document.getElementById('upload-section').style.display = 'none';
    document.getElementById('loading-section').style.display = 'block';

    const msgs = ['Claude가 VOC를 분석하고 있어요...', '감성 분류 및 카테고리 추출 중...', '인사이트 정리 중...'];
    let mi = 0;
    const msgInterval = setInterval(() => { mi = (mi + 1) % msgs.length; document.getElementById('loading-msg').textContent = msgs[mi]; }, 2000);
    let prog = 0;
    const progInterval = setInterval(() => { prog = Math.min(prog + Math.random() * 12, 85); document.getElementById('progress-bar').style.width = prog + '%'; }, 500);

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ csvContent: csvContent.split('\n').slice(0, 51).join('\n') })
      });
      const result = await res.json();
clearInterval(msgInterval);
clearInterval(progInterval);
document.getElementById('progress-bar').style.width = '100%';
if (result.error) {
  document.getElementById('loading-msg').textContent = '오류: ' + result.error;
  return;
}
setTimeout(() => renderResult(result), 400);
    } catch(e) {
      clearInterval(msgInterval);
      clearInterval(progInterval);
      document.getElementById('loading-msg').textContent = '오류가 발생했습니다: ' + e.message;
    }
  }

  const barColors = ['#185FA5','#378ADD','#85B7EB','#B5D4F4','#ddeaf8'];
  const posColors = ['#3B6D11','#639922','#97C459','#C0DD97','#dff0c8'];

  function renderResult(r) {
    document.getElementById('loading-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';

    document.getElementById('metrics').innerHTML = `
      <div class="metric-card"><div class="metric-num">${r.total}</div><div class="metric-label">전체 VOC 수</div></div>
      <div class="metric-card"><div class="metric-num red">${Math.round(r.negative_ratio)}%</div><div class="metric-label">부정 비율</div></div>
      <div class="metric-card"><div class="metric-num green">${Math.round(r.positive_ratio)}%</div><div class="metric-label">긍정 비율</div></div>
    `;

    document.getElementById('complaints').innerHTML = r.complaints.map((c, i) => `
      <div class="bar-item">
        <div class="bar-top">
          <span class="bar-rank">${c.rank}</span>
          <span class="bar-topic">${c.topic}</span>
          <span class="bar-pct">${Math.round(c.pct)}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.pct)}%;background:${barColors[i]}"></div></div>
        <div class="bar-example">${c.example}</div>
      </div>
    `).join('');

    document.getElementById('positives').innerHTML = r.positives.map((p, i) => `
      <div class="bar-item">
        <div class="bar-top">
          <span class="bar-rank">${p.rank}</span>
          <span class="bar-topic">${p.topic}</span>
          <span class="bar-pct">${Math.round(p.pct)}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.pct)}%;background:${posColors[i]}"></div></div>
        <div class="bar-example">${p.example}</div>
      </div>
    `).join('');

    document.getElementById('urgent').innerHTML = r.urgent.map(u => `
      <div class="issue-item">
        <h4><span class="badge badge-red">${u.severity === 'high' ? '긴급' : '주의'}</span>${u.issue}</h4>
        <p>${u.reason}</p>
      </div>
    `).join('');

    document.getElementById('suggestions').innerHTML = r.suggestions.map(s => `
      <div class="suggest-item">
        <h4><span class="badge badge-blue">제안</span>${s.title}</h4>
        <p>${s.detail}</p>
      </div>
    `).join('');

    document.getElementById('summary').textContent = r.summary;
  }

  function resetAll() {
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('upload-section').style.display = 'block';
    document.getElementById('progress-bar').style.width = '0%';
    csvContent = '';
    analyzeBtn.disabled = true;
    document.getElementById('file-badge').style.display = 'none';
    fileInput.value = '';
  }
</script>
</body>
</html>
